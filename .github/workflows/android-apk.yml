name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: front
        run: pnpm install --frozen-lockfile

      - name: Build web
        working-directory: front
        run: pnpm build

      - name: Add Android platform
        working-directory: front
        run: |
          if [ ! -d android ]; then
            pnpm exec cap add android
          fi

      - name: Sync Capacitor
        working-directory: front
        run: pnpm exec cap sync android

      - name: Make Gradle wrapper executable
        working-directory: front/android
        run: chmod +x ./gradlew

      - name: Build debug APK
        working-directory: front/android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: comics-app-debug-apk
          path: front/android/app/build/outputs/apk/debug/*.apk

      - name: Prepare release APK
        if: github.ref == 'refs/heads/main'
        working-directory: front/android
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/*.apk release/comicr-debug.apk

      - name: Publish debug release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: debug-latest
          TITLE: Comicr Debug APK
        run: |
          git tag -f "$TAG" "$GITHUB_SHA"
          git push --force origin "refs/tags/$TAG"

          NOTES="Latest debug APK built from commit ${GITHUB_SHA}."
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TITLE" --notes "$NOTES" --prerelease
          else
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" --title "$TITLE" --notes "$NOTES" --prerelease
          fi

          gh release upload "$TAG" front/android/release/comicr-debug.apk --repo "$GITHUB_REPOSITORY" --clobber
