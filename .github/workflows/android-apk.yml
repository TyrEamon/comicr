name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: front
        run: pnpm install --frozen-lockfile

      - name: Build web
        working-directory: front
        run: pnpm build

      - name: Add Android platform
        working-directory: front
        run: |
          if [ ! -d android ]; then
            pnpm exec cap add android
          fi

      - name: Sync Capacitor
        working-directory: front
        run: pnpm exec cap sync android

      - name: Make Gradle wrapper executable
        working-directory: front/android
        run: chmod +x ./gradlew

      - name: Decode release keystore
        working-directory: front/android
        env:
          COMICR_KEYSTORE_BASE64: ${{ secrets.COMICR_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$COMICR_KEYSTORE_BASE64" ]; then
            printf '%s' "$COMICR_KEYSTORE_BASE64" | base64 --decode > app/comicr-upload.jks
          fi

      - name: Build APK
        working-directory: front/android
        env:
          COMICR_VERSION_CODE: ${{ github.run_number }}
          COMICR_VERSION_NAME: 1.0.${{ github.run_number }}
          COMICR_KEYSTORE_PATH: app/comicr-upload.jks
          COMICR_KEYSTORE_PASSWORD: ${{ secrets.COMICR_KEYSTORE_PASSWORD }}
          COMICR_KEY_ALIAS: ${{ secrets.COMICR_KEY_ALIAS }}
          COMICR_KEY_PASSWORD: ${{ secrets.COMICR_KEY_PASSWORD }}
          COMICR_KEYSTORE_TYPE: ${{ secrets.COMICR_KEYSTORE_TYPE }}
        run: |
          mkdir -p release
          APKSIGNER="$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -n 1)/apksigner"
          if [ -f "$COMICR_KEYSTORE_PATH" ] \
            && [ -n "$COMICR_KEYSTORE_PASSWORD" ] \
            && [ -n "$COMICR_KEY_PASSWORD" ]; then
            ./gradlew assembleRelease
            RELEASE_APK="$(find app/build/outputs/apk/release -name '*.apk' ! -name '*unsigned*' | head -n 1)"
            if [ -z "$RELEASE_APK" ]; then
              echo "::error::Release signing was configured, but Gradle did not produce a signed release APK."
              find app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' -print
              exit 1
            fi
            cp "$RELEASE_APK" release/comicr.apk
            "$APKSIGNER" verify --verbose --print-certs release/comicr.apk
          else
            echo "::warning::Signing secrets are not configured; building debug APK. This APK may not support stable overwrite updates across CI runs."
            ./gradlew assembleDebug
            cp app/build/outputs/apk/debug/*.apk release/comicr-debug.apk
          fi
          ls -lah release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: comicr-android-apk
          path: front/android/release/*.apk

      - name: Publish APK releases
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
          LATEST_TAG: debug-latest
          LATEST_TITLE: Comicr Latest APK
          COMICR_VERSION_CODE: ${{ github.run_number }}
          COMICR_VERSION_NAME: 1.0.${{ github.run_number }}
          VERSION_TAG: apk-v1.0.${{ github.run_number }}
        run: |
          APK_PATH="$(find front/android/release -maxdepth 1 -type f -name '*.apk' | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            echo "::error::No APK found in front/android/release."
            exit 1
          fi

          VERSIONED_APK="front/android/release/comicr-${COMICR_VERSION_NAME}.apk"
          cp "$APK_PATH" "$VERSIONED_APK"
          NOTES="APK built from commit ${GITHUB_SHA}. versionName=${COMICR_VERSION_NAME}, versionCode=${COMICR_VERSION_CODE}."

          if gh release view "$VERSION_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$VERSION_TAG" --repo "$GITHUB_REPOSITORY" --title "Comicr APK ${COMICR_VERSION_NAME}" --notes "$NOTES" --prerelease
          else
            gh release create "$VERSION_TAG" --repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" --title "Comicr APK ${COMICR_VERSION_NAME}" --notes "$NOTES" --prerelease
          fi

          gh release upload "$VERSION_TAG" "$VERSIONED_APK" --repo "$GITHUB_REPOSITORY" --clobber

          git tag -f "$LATEST_TAG" "$GITHUB_SHA"
          git push --force origin "refs/tags/$LATEST_TAG"

          LATEST_NOTES="Latest APK built from commit ${GITHUB_SHA}. versionName=${COMICR_VERSION_NAME}, versionCode=${COMICR_VERSION_CODE}."
          if gh release view "$LATEST_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$LATEST_TAG" --repo "$GITHUB_REPOSITORY" --title "$LATEST_TITLE" --notes "$LATEST_NOTES" --prerelease
          else
            gh release create "$LATEST_TAG" --repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" --title "$LATEST_TITLE" --notes "$LATEST_NOTES" --prerelease
          fi

          gh release upload "$LATEST_TAG" "$APK_PATH" --repo "$GITHUB_REPOSITORY" --clobber
