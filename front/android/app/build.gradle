apply plugin: 'com.android.application'
apply plugin: 'com.chaquo.python'

def envOrDefault = { name, fallback ->
    def value = System.getenv(name)
    return value == null || value.trim().isEmpty() ? fallback : value.trim()
}

def resolveSigningKeyAlias = { storeFile, storePassword, storeType, preferredAlias ->
    if (!storeFile || !storeFile.exists() || !storePassword) return preferredAlias

    def keyStore = java.security.KeyStore.getInstance(storeType ?: java.security.KeyStore.getDefaultType())
    storeFile.withInputStream { stream ->
        keyStore.load(stream, storePassword.toCharArray())
    }

    if (preferredAlias && keyStore.containsAlias(preferredAlias)) {
        return preferredAlias
    }

    def aliases = keyStore.aliases()
    while (aliases.hasMoreElements()) {
        def alias = aliases.nextElement()
        if (keyStore.isKeyEntry(alias)) {
            logger.lifecycle("Using signing key alias '${alias}' from ${storeFile.name}.")
            return alias
        }
    }

    return preferredAlias
}

def intEnvOrDefault = { name, fallback ->
    def value = System.getenv(name)
    if (value == null || value.trim().isEmpty()) return fallback
    try {
        return Math.max(1, value.trim().toInteger())
    } catch (ignored) {
        return fallback
    }
}

def appVersionCode = intEnvOrDefault('COMICR_VERSION_CODE', 1)
def appVersionName = envOrDefault('COMICR_VERSION_NAME', '1.0')
def releaseStorePath = envOrDefault('COMICR_KEYSTORE_PATH', '')
def releaseStoreFile = releaseStorePath ? rootProject.file(releaseStorePath) : null
def releaseStorePassword = envOrDefault('COMICR_KEYSTORE_PASSWORD', '')
def releaseKeyAlias = envOrDefault('COMICR_KEY_ALIAS', '')
def releaseKeyPassword = envOrDefault('COMICR_KEY_PASSWORD', '')
def releaseStoreType = envOrDefault('COMICR_KEYSTORE_TYPE', '')
def resolvedReleaseKeyAlias = resolveSigningKeyAlias(releaseStoreFile, releaseStorePassword, releaseStoreType, releaseKeyAlias)
def hasReleaseSigning = releaseStorePath
    && releaseStorePassword
    && resolvedReleaseKeyAlias
    && releaseKeyPassword
    && releaseStoreFile.exists()

android {
    namespace "com.tyr.comicsapp"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.tyr.comicsapp"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode appVersionCode
        versionName appVersionName
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        ndk {
            abiFilters "arm64-v8a", "x86_64"
        }
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        if (hasReleaseSigning) {
            release {
                storeFile releaseStoreFile
                storePassword releaseStorePassword
                keyAlias resolvedReleaseKeyAlias
                keyPassword releaseKeyPassword
                if (releaseStoreType) {
                    storeType releaseStoreType
                }
            }
        }
    }
    buildTypes {
        release {
            if (hasReleaseSigning) {
                signingConfig signingConfigs.release
            }
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

chaquopy {
    defaultConfig {
        version = "3.11"
        pip {
            install "commonX==0.6.40"
            install "Pillow"
            install "pycryptodome"
            install "PyYAML"
            install "requests"
            install "PySocks"
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation "androidx.documentfile:documentfile:$androidxDocumentFileVersion"
    implementation "com.squareup.okhttp3:okhttp:$okhttpVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
